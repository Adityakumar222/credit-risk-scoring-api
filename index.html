<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Risk Predictor</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
h2 {
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
button:disabled {
    background: gray;
}
.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    display: none;
}
.low { background: #16a34a; }
.medium { background: #eab308; color: black; }
.high { background: #dc2626; }
.error { background: #ef4444; }
</style>

</head>
<body>

<div class="container">
    <h2>Credit Risk Predictor</h2>

    <input id="income" placeholder="Applicant Income">
    <input id="coincome" placeholder="Coapplicant Income">
    <input id="loan" placeholder="Loan Amount">
    <input id="term" placeholder="Loan Term">
    <input id="history" placeholder="Credit History (0 or 1)">

    <button id="btn" onclick="predict()">Predict Risk</button>

    <div id="result" class="result"></div>
</div>

<script>
async function predict() {
    const btn = document.getElementById("btn");
    const box = document.getElementById("result");

    // validation
    let income = document.getElementById("income").value;
    let coincome = document.getElementById("coincome").value;
    let loan = document.getElementById("loan").value;
    let term = document.getElementById("term").value;
    let history = document.getElementById("history").value;

    if (!income || !coincome || !loan || !term || !history) {
        showError("Fill all fields");
        return;
    }

    const data = {
        ApplicantIncome: Number(income),
        CoapplicantIncome: Number(coincome),
        LoanAmount: Number(loan),
        Loan_Amount_Term: Number(term),
        Credit_History: Number(history)
    };

    try {
        btn.disabled = true;
        btn.innerText = "Predicting...";

        const res = await fetch("https://credit-risk-scoring-api1.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error("API failed");

        const result = await res.json();

        let risk = result.risk_level.toLowerCase();
        let prob = (result.default_probability * 100).toFixed(2);

        box.className = "result " + risk;
        box.style.display = "block";
        box.innerHTML = `
            <strong>${result.risk_level} Risk</strong><br>
            Probability: ${prob}%
        `;

    } catch (err) {
        showError("Server error / CORS issue");
        console.log(err);
    } finally {
        btn.disabled = false;
        btn.innerText = "Predict Risk";
    }
}

function showError(msg) {
    const box = document.getElementById("result");
    box.className = "result error";
    box.style.display = "block";
    box.innerText = msg;
}
</script>

</body>
</html>
