<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Risk Predictor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* glow background */
.bg-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #6366f1, transparent);
    filter: blur(120px);
    z-index: -1;
}

/* glass card */
.container {
    backdrop-filter: blur(20px);
    background: rgba(30, 41, 59, 0.6);
    padding: 35px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.2s;
}

input:focus {
    background: rgba(255,255,255,0.15);
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}

button:disabled {
    background: gray;
}

.result {
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    display: none;
    font-weight: bold;
}

.low { background: #16a34a; }
.medium { background: #eab308; color: black; }
.high { background: #dc2626; }
.error { background: #ef4444; }
</style>

</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <h2>Credit Risk Predictor</h2>

    <input id="income" placeholder="Applicant Income">
    <input id="coincome" placeholder="Coapplicant Income">
    <input id="loan" placeholder="Loan Amount">
    <input id="term" placeholder="Loan Term">
    <input id="history" placeholder="Credit History (0 or 1)">

    <button id="btn" onclick="predict()">Predict Risk</button>

    <div id="result" class="result"></div>
</div>

<script>
async function predict() {
    const btn = document.getElementById("btn");
    const box = document.getElementById("result");

    let income = document.getElementById("income").value;
    let coincome = document.getElementById("coincome").value;
    let loan = document.getElementById("loan").value;
    let term = document.getElementById("term").value;
    let history = document.getElementById("history").value;

    if (!income || !coincome || !loan || !term || !history) {
        showError("Fill all fields");
        return;
    }

    const data = {
        ApplicantIncome: Number(income),
        CoapplicantIncome: Number(coincome),
        LoanAmount: Number(loan),
        Loan_Amount_Term: Number(term),
        Credit_History: Number(history)
    };

    try {
        btn.disabled = true;
        btn.innerText = "Predicting...";

        const res = await fetch("https://credit-risk-scoring-api1.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error("API failed");

        const result = await res.json();

        let risk = result.risk_level.toLowerCase();
        let prob = (result.default_probability * 100).toFixed(2);

        box.className = "result " + risk;
        box.style.display = "block";
        box.innerHTML = `
            <strong>${result.risk_level} Risk</strong><br>
            Probability: ${prob}%
        `;

    } catch (err) {
        showError("Server error / API issue");
        console.log(err);
    } finally {
        btn.disabled = false;
        btn.innerText = "Predict Risk";
    }
}

function showError(msg) {
    const box = document.getElementById("result");
    box.className = "result error";
    box.style.display = "block";
    box.innerText = msg;
}
</script>

</body>
</html>
